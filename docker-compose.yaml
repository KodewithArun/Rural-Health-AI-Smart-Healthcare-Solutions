version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: rural_health_db
    environment:
      POSTGRES_DB: rural_health_assistant_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rural_health_redis
    command: redis-server --requirepass redis_password_123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: rural_health_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key
      - DATABASE_URL=postgresql://postgres:postgres_password_123@db:5432/rural_health_assistant_db
      - REDIS_URL=redis://:redis_password_123@redis:6379/0
      - CELERY_BROKER_URL=redis://:redis_password_123@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:redis_password_123@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build: .
    container_name: rural_health_celery
    command: celery -A rural_health_assistant worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key
      - DATABASE_URL=postgresql://postgres:postgres_password_123@db:5432/rural_health_assistant_db
      - REDIS_URL=redis://:redis_password_123@redis:6379/0
      - CELERY_BROKER_URL=redis://:redis_password_123@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:redis_password_123@redis:6379/0
    depends_on:
      - db
      - redis
      - web

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: rural_health_network
